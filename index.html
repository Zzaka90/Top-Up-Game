<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Up Game</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }

    header h1 {
      color: cyan;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(to right, #06b6d4, #7c3aed);
    }

    .hero h2 {
      font-size: 50px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
    }

    .games {
      padding: 50px 20px;
    }

    .games h2 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 35px;
    }

    .game-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 20px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }

    .card-content h3 {
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      background: cyan;
      color: black;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 10px;
    }

    .topup {
      padding: 60px 20px;
    }

    .form-box {
      max-width: 500px;
      margin: auto;
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
    }

    .form-box h2 {
      text-align: center;
      margin-bottom: 25px;
    }

    input,
    select {
      width: 100%;
      padding: 15px;
      margin-bottom: 20px;
      border: none;
      border-radius: 10px;
      background: #0f172a;
      color: white;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: cyan;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 30px;
      background: #111827;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>TOPUP GAME</h1>

    <nav>
      <a href="#">Home</a>
      <a href="#games">Game</a>
      <a href="#topup">Top Up</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Top Up Game Murah & Cepat</h2>
    <p>Top up diamond dan voucher game favorit kamu dengan mudah.</p>
  </section>

  <section class="games" id="games">
    <h2>Game Populer</h2>

    <div class="game-list">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1542751110-97427bbecf20?q=80&w=1200&auto=format&fit=crop" alt="ML" />

        <div class="card-content">
          <h3>Mobile Legends</h3>
          <a href="#topup" class="btn">Top Up</a>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop" alt="FF" />

        <div class="card-content">
          <h3>Free Fire</h3>
          <a href="#topup" class="btn">Top Up</a>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?q=80&w=1200&auto=format&fit=crop" alt="PUBG" />

        <div class="card-content">
          <h3>PUBG Mobile</h3>
          <a href="#topup" class="btn">Top Up</a>
        </div>
      </div>
    </div>
  </section>

  <section class="topup" id="topup">
    <div class="form-box">
      <h2>Form Top Up</h2>

      <input type="text" placeholder="Masukkan User ID" />

      <select>
        <option>86 Diamond - Rp20.000</option>
        <option>172 Diamond - Rp40.000</option>
        <option>257 Diamond - Rp60.000</option>
      </select>

      <select>
        <option>DANA</option>
        <option>OVO</option>
        <option>GoPay</option>
        <option>QRIS</option>
      </select>

      <button>Bayar Sekarang</button>
    </div>
  </section>

  <footer>
    <p>© 2026 Top Up Game</p>
  </footer>

</body>
</html>
